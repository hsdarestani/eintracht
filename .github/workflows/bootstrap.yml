name: Deploy application

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: eintracht-production
  cancel-in-progress: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate Django application
        shell: bash
        env:
          DJANGO_SECRET_KEY: ci-only-secret-key
        run: |
          set -euo pipefail
          pip install -r requirements.txt
          python manage.py check
          python manage.py test
          python manage.py collectstatic --noinput

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: root
          password: ${{ secrets.PASS }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive

            if ! command -v git >/dev/null 2>&1; then
              apt-get update
              apt-get install -y git curl openssl
            fi

            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi

            if ! docker compose version >/dev/null 2>&1; then
              apt-get update
              apt-get install -y docker-compose-plugin
            fi

            mkdir -p /opt/eintracht
            if [ ! -d /opt/eintracht/.git ]; then
              rm -rf /opt/eintracht
              git clone https://github.com/hsdarestani/eintracht.git /opt/eintracht
            else
              cd /opt/eintracht
              git fetch origin main
              git reset --hard origin/main
              git clean -fd -e .env
            fi

            cd /opt/eintracht

            if [ ! -f .env ]; then
              SECRET=$(openssl rand -hex 48)
              DBPASS=$(openssl rand -hex 32)
              cat > .env <<ENVFILE
            DJANGO_SECRET_KEY=$SECRET
            POSTGRES_DB=teamboard
            POSTGRES_USER=teamboard
            POSTGRES_PASSWORD=$DBPASS
            DJANGO_ALLOWED_HOSTS=eintracht.smarbiz.sbs,91.107.148.46
            CSRF_TRUSTED_ORIGINS=https://eintracht.smarbiz.sbs
            ENVFILE
              chmod 600 .env
            fi

            docker compose up -d --build --remove-orphans
            docker image prune -f

            for attempt in $(seq 1 30); do
              if curl -fsS http://127.0.0.1/health/ -H 'Host: eintracht.smarbiz.sbs' >/dev/null; then
                echo "Application health check passed."
                docker compose ps
                exit 0
              fi
              sleep 4
            done

            echo "Application did not become healthy in time."
            docker compose ps
            docker compose logs --tail=200
            exit 1