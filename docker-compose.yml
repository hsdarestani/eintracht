services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teamboard}
      POSTGRES_USER: ${POSTGRES_USER:-teamboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamboard-change-this}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teamboard} -d ${POSTGRES_DB:-teamboard}"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-replace-this-production-secret}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-eintracht.smarbiz.sbs,91.107.148.46,localhost}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://eintracht.smarbiz.sbs}
      POSTGRES_DB: ${POSTGRES_DB:-teamboard}
      POSTGRES_USER: ${POSTGRES_USER:-teamboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamboard-change-this}
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
