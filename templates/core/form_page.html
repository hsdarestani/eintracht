{% extends 'core/base.html' %}{% block title %}{{ title }}{% endblock %}{% block content %}
<div class="back-row"><a href="{% url cancel_url %}">← Zurück</a></div><section class="simple-form-page"><div><span class="eyebrow">{{ eyebrow }}</span><h1>{{ title }}</h1><p>Nur die Informationen, die der Trainer später wirklich braucht.</p></div><form method="post" class="card standard-form">{% csrf_token %}{{ form.non_field_errors }}<div class="form-grid">{% for field in form %}<label class="{% if field.name == 'notes' or field.name == 'focus' %}full{% endif %}">{{ field.label }}{{ field }}{% if field.errors %}<small class="error">{{ field.errors|striptags }}</small>{% endif %}</label>{% endfor %}</div><div class="form-actions"><a href="{% url cancel_url %}" class="btn btn-secondary">Abbrechen</a><button class="btn btn-primary">{{ submit_label }}</button></div></form></section>
{% endblock %}
